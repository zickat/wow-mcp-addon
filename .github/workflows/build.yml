name: Build wow-mcp

# Déclenché sur un push de tag v* (ex: v1.0.0)
# ou manuellement depuis l'onglet Actions
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: wow-mcp.exe
            label: windows
          - os: macos-latest
            artifact: wow-mcp
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r wow-mcp/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build-mcp.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wow-mcp-${{ matrix.label }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    # Seulement sur un push de tag (pas sur workflow_dispatch sans tag)
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: wow-mcp-windows
          path: dist/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: wow-mcp-macos
          path: dist/macos

      - name: Rename artifacts
        run: |
          mv dist/windows/wow-mcp.exe dist/wow-mcp-windows.exe
          mv dist/macos/wow-mcp      dist/wow-mcp-macos
          chmod +x dist/wow-mcp-macos

      - name: Package addon
        run: |
          zip -r dist/CharExport-addon.zip CharExport/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WoW TBC MCP ${{ github.ref_name }}"
          body: |
            ## Installation

            ### 1. Addon WoW
            Télécharge **CharExport-addon.zip**, extrais dans `Interface/AddOns/`, puis `/exportchar` + `/reload` en jeu.

            ### 2. Serveur MCP
            Télécharge le binaire pour ton OS :
            - **Windows** → `wow-mcp-windows.exe`
            - **macOS** → `wow-mcp-macos`

            ### 3. Config Claude Desktop
            Ajoute dans `claude_desktop_config.json` :
            ```json
            {
              "mcpServers": {
                "wow-char-export": {
                  "command": "/chemin/vers/wow-mcp-macos"
                }
              }
            }
            ```
            *(remplace par le chemin réel du binaire téléchargé)*

            **macOS** : si bloqué par Gatekeeper → `xattr -c wow-mcp-macos && chmod +x wow-mcp-macos`
          files: |
            dist/wow-mcp-windows.exe
            dist/wow-mcp-macos
            dist/CharExport-addon.zip
          draft: false
          prerelease: false
